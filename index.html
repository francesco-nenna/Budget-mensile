<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Familiare Duo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-4 bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-md mx-auto space-y-6 pb-24">
        
        <!-- Header con Stato Connessione -->
        <header class="text-center py-2">
            <div class="flex items-center justify-center gap-2 mb-1">
                <span class="text-xl">📊</span>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-800 uppercase">Budget Familiare</h1>
            </div>
            <div id="status-container" class="flex justify-center items-center gap-1.5">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span>
                <p id="status-text" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sincronizzazione...</p>
            </div>
        </header>

        <!-- Box Residuo Totale Dinamico -->
        <div class="bg-indigo-600 text-white rounded-[2.5rem] p-8 shadow-2xl shadow-indigo-200 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
            <h2 class="text-[10px] opacity-70 uppercase font-black text-center tracking-[0.2em] mb-1">Residuo Reale in Tasca</h2>
            <p id="total-remaining" class="text-5xl font-black text-center tabular-nums">€ 0,00</p>
        </div>

        <!-- Container Categorie -->
        <div id="categories-container" class="space-y-4">
            <!-- Skeleton loader mentre carica -->
            <div class="animate-pulse space-y-3">
                <div class="h-24 bg-white rounded-3xl border border-slate-100"></div>
                <div class="h-24 bg-white rounded-3xl border border-slate-100 shadow-sm"></div>
            </div>
        </div>

        <!-- Form Registrazione Spesa -->
        <div class="bg-white rounded-[2rem] p-6 shadow-xl shadow-slate-200/40 border border-slate-100">
            <h3 class="font-extrabold text-slate-800 mb-5 flex items-center gap-2 text-xs uppercase tracking-wider">
                <span class="bg-indigo-50 text-indigo-600 p-2 rounded-xl">💸</span> 
                Registra Spesa
            </h3>
            <div class="space-y-4">
                <div class="relative group">
                    <select id="select-cat" class="w-full p-4 pr-10 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white transition-all outline-none appearance-none font-bold text-slate-700"></select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-xs">▼</div>
                </div>
                
                <input type="number" id="input-amount" step="0.01" inputmode="decimal" placeholder="Importo (€)" 
                    class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white transition-all outline-none text-slate-700 font-black text-xl placeholder:text-slate-300 placeholder:font-normal">
                
                <button onclick="addExpense()" id="btn-add" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200 disabled:opacity-50 uppercase tracking-widest text-xs">
                    Invia a Google Sheets
                </button>
            </div>
        </div>

        <!-- Pulsante Reset Mensile -->
        <div class="text-center pt-2">
            <button onclick="resetAll()" id="btn-reset" class="text-slate-300 text-[9px] font-black uppercase tracking-[0.3em] hover:text-red-400 transition-all py-2 px-6 rounded-full border border-slate-100">
                🔄 Reset Nuovo Mese
            </button>
        </div>
    </div>

    <script>
        // --- INCOLLA QUI L'URL DELLA TUA WEB APP (APPS SCRIPT) ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEbCA_J3s0yZzmROL54uCVKQT0FBovSGAW6Qse7RFMgEcv2_W4UFcXaA0qXCLjjUmMgQ/exec'; 

        let state = [];

        // 1. Lettura dati da Google
        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error();
                state = await response.json();
                render();
                updateStatus("Connesso", "bg-emerald-500");
            } catch (e) {
                updateStatus("Errore Sync", "bg-red-500");
            }
        }

        function updateStatus(text, colorClass) {
            document.getElementById('status-dot').className = `w-2 h-2 rounded-full ${colorClass}`;
            document.getElementById('status-text').innerText = text;
        }

        // 2. Rendering Dinamico
        function render() {
            const container = document.getElementById('categories-container');
            const select = document.getElementById('select-cat');
            const currentSelected = select.value;
            
            container.innerHTML = '';
            let selectHTML = '<option value="">Seleziona categoria...</option>';
            
            // Il residuo reale è calcolato su: Entrate Totali - Somma di tutte le spese effettuate
            let entrateMensili = state.length > 0 ? state[0].entrateGlobali : 0;
            let totaleSpesoFinora = 0;

            state.forEach(item => {
                totaleSpesoFinora += item.spent;
                const remaining = item.budget - item.spent;
                const progress = Math.min((item.spent / item.budget) * 100, 100);
                
                // Colore barra dinamico
                const color = progress > 95 ? 'bg-red-500' : (progress > 75 ? 'bg-orange-400' : 'bg-emerald-500');

                container.innerHTML += `
                    <div class="bg-white rounded-[1.5rem] p-5 shadow-sm border border-slate-100 transition-transform active:scale-[0.98]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-extrabold text-slate-700 text-sm tracking-tight">${item.name}</span>
                            <span class="font-black text-indigo-600 text-base">€ ${remaining.toFixed(2)}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                            <div class="h-full ${color} transition-all duration-[1500ms] ease-out" style="width: ${progress}%"></div>
                        </div>
                        <div class="flex justify-between mt-2.5 text-[9px] text-slate-400 font-bold uppercase tracking-widest">
                            <span>Budget: € ${item.budget}</span>
                            <span>Spesi: € ${item.spent.toFixed(2)}</span>
                        </div>
                    </div>`;
                
                selectHTML += `<option value="${item.id}">${item.name}</option>`;
            });

            const residuoReale = entrateMensili - totaleSpesoFinora;
            
            select.innerHTML = selectHTML;
            select.value = currentSelected;
            document.getElementById('total-remaining').innerText = `€ ${residuoReale.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
        }

        // 3. Scrittura spesa
        async function addExpense() {
            const id = document.getElementById('select-cat').value;
            const amountInput = document.getElementById('input-amount');
            const amount = amountInput.value;
            const btn = document.getElementById('btn-add');

            if (!id || !amount || amount <= 0) return alert("Inserisci categoria e importo corretto");

            btn.disabled = true;
            btn.innerText = "Sincronizzazione...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify({ id: id, amount: amount })
                });
                
                amountInput.value = '';
                btn.innerText = "Registrato!";
                setTimeout(loadData, 2000); // Ricarica dopo l'invio
            } catch (e) {
                alert("Errore di rete");
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "Invia a Google Sheets";
                }, 3500);
            }
        }

        // 4. Reset Mensile
        async function resetAll() {
            if (!confirm("Attenzione: vuoi azzerare tutte le spese per il nuovo mese?")) return;
            const btn = document.getElementById('btn-reset');
            const oldText = btn.innerText;
            btn.innerText = "AZZERAMENTO...";
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "reset" })
                });
                setTimeout(loadData, 2500);
            } catch (e) { alert("Errore reset"); }
            finally { setTimeout(() => btn.innerText = oldText, 4000); }
        }

        // Avvio e Loop
        loadData();
        setInterval(loadData, 45000); // Refresh automatico ogni 45 secondi
    </script>
</body>
</html>
